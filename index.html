<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branwood Group — Dashboards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      width: 44px;
      height: 44px;
      background: #e8a020;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    header p {
      font-size: 13px;
      color: #a0a8bb;
      margin-top: 2px;
    }

    main {
      flex: 1;
      padding: 48px 40px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border: 1px solid #e8eaed;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.11);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card-icon.orange { background: #fff4e0; }
    .card-icon.blue   { background: #e8f0fe; }
    .card-icon.green  { background: #e6f4ea; }
    .card-icon.purple { background: #f3e8fd; }

    .card h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card p {
      font-size: 13px;
      color: #777;
      line-height: 1.5;
    }

    .card .arrow {
      margin-top: auto;
      font-size: 13px;
      font-weight: 600;
      color: #e8a020;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">BW</div>
    <div>
      <h1>Branwood Group</h1>
      <p>Internal Dashboards</p>
    </div>
  </header>

  <main>
    <div class="section-title">Select a Dashboard</div>
    <div class="grid">

      <a class="card" href="daily-sales-dashboard.html">
        <div class="card-icon orange">📊</div>
        <h2>Daily Sales Dashboard</h2>
        <p>Track daily revenue across all outlets and brands.</p>
        <span class="arrow">Open →</span>
      </a>

      <a class="card" href="food-delivery-dashboard.html">
        <div class="card-icon blue">🛵</div>
        <h2>Food Delivery Dashboard</h2>
        <p>Analyse Foodpanda and GrabFood statement performance.</p>
        <span class="arrow">Open →</span>
      </a>

    </div>
  </main>

  <footer>Branwood Group &copy; 2026</footer>

</body>
</html>
